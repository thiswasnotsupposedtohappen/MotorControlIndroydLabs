                <button id="btnRefresh" class="btn icon" title="Refresh COM Ports">⟳</button>
                <div class="input-group">
                    <label>COM PORT</label>
                    <select id="comPort" style="min-width:100px;">
                        <option value="">Scanning...</option>
                    </select>
                </div>
                <button id="btnConnect" class="btn secondary">CONNECT</button>    
                <div id="statusConn" class="status-indicator disconnected status-indicator-mod" style="display: flex;justify-content: center;align-items: center;height: 38px; width: 80px;">DISCONNECTED</div>
                <a href="program.html" id="btnSettings" class="btn icon" title="Configure Motion Profile">⚙</a>
            </div>
        </header>

            <section class="main-content-area">
                <div class="config-panel glass">
                    <div class="config-grid">
                        <!-- Persons -->
                        <div class="config-item">
                            <label>NO.of Persons</label>
                            <div class="button-group" id="seatsGroup">
                                <button class="btn-toggle" data-value="1">1</button>
                                <button class="btn-toggle" data-value="2">2</button>
                                <button class="btn-toggle" data-value="3">3</button>
                                <button class="btn-toggle" data-value="4">4</button>
                            </div>
                        </div>

                        <div class="config-item date-item">
                            <div class="date-card glass" id="dateCard">
                                <div id="displayDay">Loading...</div>
                                <div id="displayDate">--/--/----</div>
                                <input type="date" id="datePicker">
                            </div>
                        </div>

                        <!-- Type of Ride -->
                        <div class="config-item">
                            <label>Type of Ride</label>
                            <div class="button-group" id="difficultyGroup">
                                <button class="btn-toggle" data-value="0">Normal</button>
                                <button class="btn-toggle" data-value="1">HighThrill</button>
                            </div>
                        </div>
                     
                        <!-- Total Rides -->
                        <a href="reports.html" class="config-item date-item rides-card">
                            <label style="cursor:pointer;">Total Rides</label>
                            <div class="odometer" id="totalRides">
                                <span>0</span><span>0</span><span>0</span>
                            </div>
                        </a>

                    </div>               
                         
                    <!-- Next Button -->
                    <div class="config-item action-item">
                        <a href="run.html" class="btn primary next-btn" style="font-size: 2rem;">
                            NEXT
                        </a>
                    </div>

                </div>
            </section>
