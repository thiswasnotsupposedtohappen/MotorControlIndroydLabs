<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta MS300 VFD Control</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body class="landing-page">
    <div class="login-container landing-container glass">
        <div class="landing-header">
            <img src="logo.png" alt="HUMAN GYRO Logo" class="landing-logo">
        </div>
        
        <div class="landing-content">
            <p class="status-msg">AUTHENTICATION REQUIRED</p>
            
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="username">OPERATOR ID</label>
                    <input type="text" id="username" placeholder="Enter ID" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label for="password">ACCESS CODE</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                
                <div id="loginError" class="error-msg hidden">INVALID CREDENTIALS</div>
                
                <button type="submit" class="btn primary large glow">AUTHORIZE ACCESS</button>
            </form>
        </div>
        
        <div class="landing-footer">
            <p>© 2026 INDROYD LABS</p>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
