<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Profile Configuration</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        .program-page .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .program-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="program-page">
    <div class="app-container">
        <header class="program-header">
            <div class="logo">
                <h1>Motion Profile</h1>
                <p>Configure step-by-step motion parameters</p>
            </div>
            <div class="action-buttons horizontal">
                <a href="main.html" class="btn secondary">BACK TO MAIN</a>
            </div>
        </header>

        <main>
            <div class="profile-panel glass" style="flex: 1;">
                <div class="panel-header">
                    <h3>STEP CONFIGURATION</h3>
                    <span class="badge">16 STEPS AVAILABLE</span>
                </div>
                <div class="table-container">
                    <table id="profileTable">
                        <thead>
                            <tr>
                                <th>STEP</th>
                                <th>MOTOR RPM</th>
                                <th>DURATION (S)</th>
                                <th>ABS TIME (S)</th>
                                <th>SOUND FILE</th>
                                <th>ACTIONS</th>
                            </tr>
                        </thead>
                        <tbody id="profileBody">
                            <!-- Generated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
